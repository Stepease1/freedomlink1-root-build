# FreedomLink1 Root Build - GitHub Pages Configuration\n\n# Site settings\ntitle: FreedomLink1 Root Build v1.0.0\ndescription: Sovereign-grade governance, omni-domain constitutions, Merkle-rooted proofs, and public verification\nbaseurl: \"/freedomlink1-root-build\"\nurl: \"https://github.com/Stepease1/freedomlink1-root-build\"\n\n# Build settings\ntheme: jekyll-default\nmarkdown: kramdown\nplugins:\n  - jekyll-sitemap\n  - jekyll-seo-tag\n  - jekyll-feed\n\n# Defaults\ndefaults:\n  - scope:\n      path: \"docs\"\n    values:\n      layout: \"default\"\n      permalink: /:title\n\n# GitHub Pages settings\n# Build and deployment\ninclude:\n  - .nojekyll\n  - CNAME\n\nexclude:\n  - .git\n  - .gitignore\n  - node_modules\n  - vendor\n  - .github\n  - scripts\n  - artifacts\n\n# Collections\ncollections:\n  governance:\n    output: true\n    permalink: /governance/:name\n  lineage:\n    output: true\n    permalink: /lineage/:name\n  docs:\n    output: true\n    permalink: /:name\n\n# Navigation\nheader_pages:\n  - README.md\n  - PROCLAMATION.md\n  - CONTRIBUTING.md\n  - VERIFY.md\n\n# SEO and social settings\ntwitter:\n  username: freedomlink1\nfacebook:\n  app_id: \n  publisher: \ngoogle_site_verification: \n\n# Analytics (optional)\ngoogle_analytics: \n\n# Comments (optional)\ndisqus:\n  shortname: \n\n# Author information\nauthor:\n  name: FreedomLink1 Contributors\n  email: \n  github: Stepease1\n\n# License\nlicense: MIT\nlicense_url: /LICENSE\n\n# Permalink style\npermalink: /blog/:year/:month/:day/:title\n\n# Paginate settings\npaginate: 10\npaginate_path: /page:num\n\n# Keep files\nkeep_files:\n  - CNAME\n  - .gitignore\n\n# Show drafts\nshow_drafts: false\nfuture: false\n\n# Timezone\ntimezone: UTC\n"